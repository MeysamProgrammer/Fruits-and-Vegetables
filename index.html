<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="icon" href="/favicon-32x32.png" />
    <title>Fruits And Vegetables</title>
  </head>
  <body>
    <!-- Header Section -->

    <header>
      <!-- desktop navbar section -->

      <nav class="navbar">
        <h3>FOODMART</h3>
        <!-- Menu section -->

        <ul class="menu">
          <li>Home</li>
          <li>Fruit</li>
          <li>Vegetable</li>
        </ul>
        <!-- Searchbox section -->

        <div class="searchBox">
          <input type="text" placeholder="Search products" />
          <select name="" id="">
            <option value="">All Categories</option>
            <option value="">Categories 1</option>
            <option value="">Categories 2</option>
          </select>
          <img src="/assets/images/search.png" alt="" />
        </div>
        <!-- Operation section -->

        <section class="operation">
          <div class="iconBox">
            <img src="/assets/images/Group.png" alt="" />
            <label for="">Profile</label>
          </div>
          <div class="iconBox">
            <img src="/assets/images/hurt.png" alt="" />
            <label for="">Wishlist</label>
          </div>
          <div class="iconBox">
            <img src="/assets/images/shopping-cart.png" alt="" />
            <label for="">Mycart</label>
          </div>
        </section>
      </nav>
      <!-- Banner section -->

      <section class="banner">
        <label class="badge" for="">Daily Discounti</label>
        <h1 class="title mt_1">
          Fruits § <br />
          Vegetables
        </h1>
        <p class="about mt_1">
          These superfoods are packed with vital nutrients, including vitamins
          and minerals that can help keep you health. Plus, they’re easy to
          enjoy-just add water and let the magic happen!
        </p>
        <button class="btnBanner mt_1">
          <span>View More</span>
          <span> > </span>
        </button>
        <div class="discount">
          <img class="w_100" src="/assets/images/Star 1.png" alt="" />
          <strong>-20%</strong>
        </div>
        <div class="fruitsBanner">
          <img src="/assets/images/fruits.png" alt="" />
        </div>
      </section>
    </header>
  </body>
</html>
